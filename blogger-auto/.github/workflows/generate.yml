name: Generate Baby Name Articles

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: "Number of articles to generate"
        required: false
        default: "5"
        type: string

permissions:
  contents: write          # Required to push commits back

jobs:
  generate:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate articles via Agnes AI
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL || 'agnes-2.0-flash' }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '5' }}
        run: python generate_content.py

      - name: Repair post frontmatter
        run: python repair_posts.py

      - name: Publish to Blogger
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python publish.py

      - name: Commit and push generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*.md
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            git commit -m "Auto-generate baby name articles ($(date +%Y-%m-%d))"
            git push
          fi
