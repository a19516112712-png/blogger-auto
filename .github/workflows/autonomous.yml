name: Autonomous SEO Revenue Engine

on:
  schedule:
    - cron: "0 1 * * *"   # Daily at 1:00 AM UTC
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: "Number of articles to generate"
        required: false
        default: "10"
        type: string
      min_revenue_score:
        description: "Minimum revenue score threshold"
        required: false
        default: "30.0"
        type: string

permissions:
  contents: write

jobs:
  autonomous-run:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Autonomous Revenue Engine
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '10' }}
          MIN_REVENUE_SCORE: ${{ github.event.inputs.min_revenue_score || '30.0' }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python orchestrator.py

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*.md generated_topics.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Autonomous SEO run ($(date +%Y-%m-%d))"
            git push
          fi
