name: Autonomous SEO Content Engine

on:
  schedule:
    - cron: "0 1 * * *"   # Daily at 1:00 AM UTC
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: "Number of articles to generate"
        required: false
        default: "3"
        type: string

permissions:
  contents: write

jobs:
  autonomous-run:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Autonomous Content Engine
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL || 'agnes-2.0-flash' }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '3' }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python orchestrator.py

      - name: Publish to Blogger
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python publish.py

      - name: Commit generated content and progress state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 👇【核心修改点】不仅保存文章，还要强行把 database 和 data 文件夹里的去重进度指针一起推回大本营
          git add posts/ database/ data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Autonomous SEO run & sync progress state ($(date +%Y-%m-%d))"
            git push
          fi
