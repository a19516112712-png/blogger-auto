# Composition rules for AI baby photography prompts

framing:
  - "centered symmetrical composition"
  - "rule of thirds with baby positioned off-center"
  - "framed by natural elements like leaves or fabric"
  - "wrapped in fabric creating a circular composition"
  - "diagonal composition with baby placed along the line"
  - "minimalist negative space composition"
  - "layered composition with foreground and background elements"
  - "letterbox-style wide horizontal frame"

depth:
  - "shallow depth of field with smooth background blur"
  - "deep focus showing the entire scene in detail"
  - "foreground elements creating depth and dimension"
  - "background out of focus with baby as the sharp subject"
  - "layered elements from front to back creating three-dimensional feel"

perspective:
  - "bird's eye view directly from above"
  - "low perspective looking up at the baby"
  - "straight-on eye-level perspective"
  - "slight overhead angle for a nurturing viewpoint"
  - "close intimate perspective from the parent's point of view"
